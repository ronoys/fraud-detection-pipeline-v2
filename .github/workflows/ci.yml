name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check api/

      - name: Run tests
        run: |
          pytest tests/ -v
        # TODO: add tests/ directory with unit tests for predictor and schemas

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f infra/Dockerfile -t fraud-detection-api:ci .
