app = "fraud-detection-api"
primary_region = "iad"

[build]
  dockerfile = "infra/Dockerfile"

[env]
  FRAUD_THRESHOLD = "0.5"
  CHAMPION_WEIGHT = "0.8"
  CHAMPION_MODEL_PATH = "model/artifacts/xgboost.joblib"
  CHALLENGER_MODEL_PATH = "model/artifacts/random_forest.joblib"
  SCALER_PATH = "model/artifacts/scaler.joblib"
  TRAINING_REFERENCE_PATH = "model/artifacts/training_reference.parquet"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
