app = "fraud-ui-kvachher"
primary_region = "iad"

[build]
  dockerfile = "infra/frontend.Dockerfile"

[env]
  API_URL = "https://fraud-detection-api.fly.dev"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/_stcore/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
